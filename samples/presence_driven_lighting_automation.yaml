alias: Automation – Example Area Lights Follow Presence
description: >
  Presence-driven area lighting using a centralized targets sensor and apply scripts. Trigger-level `for:` provides OFF stickiness; manual override wins. Manual override detection watches main light only; accent adjustments are not tracked. Chatter-control timestamp (input_datetime.example_area_last_auto_apply) gates override detection — not a deferred-intent deadline.

  Depends on companion template sensor: presence_driven_lighting_targets.yaml (sensor.example_area_lighting_targets).


  **CHANGELOG:**

  - 20260607-1200: Split from combined file into standalone automation artifact. Replaced invalid elif chain with if/then/else + choose; global override is a policy gate, remaining branches route by trigger ID with inline guards. Changed mode to queued/max 5 to preserve event order and avoid silent drops. Renamed presence branch alias to match its single trigger ID.

  - 20260102-1200: Canonical example for presence-driven area lighting.

mode: queued
max: 5
max_exceeded: silent

triggers:
  - alias: Presence detected (occupied)
    id: presence_on
    trigger: state
    entity_id: binary_sensor.example_area_presence
    to: "on"

  - alias: Presence cleared (unoccupied, held by irradiance/night)
    id: presence_off
    trigger: state
    entity_id: binary_sensor.example_area_presence
    to: "off"
    for:
      seconds: >-
        {% set irr = states('sensor.example_outdoor_irradiance') | float(0) %}
        {% set night = now().hour >= 22 or now().hour < 6 %}
        {% if night %} 10
        {% elif irr <= 50 %} 45
        {% elif irr <= 300 %} 30
        {% else %} 10
        {% endif %}

  - alias: Targets changed (recompute/apply while occupied)
    id: targets_changed
    trigger: state
    entity_id: sensor.example_area_lighting_targets

  - alias: Light state/brightness changed (manual override detection)
    id: light_changed
    trigger: state
    entity_id: light.example_area_main_light

  - alias: Daily reset
    id: daily_reset
    trigger: time
    at: "05:00:00"

  - alias: Post-restart gate (non-critical)
    id: startup_noncritical
    trigger: state
    entity_id: timer.ha_startup_delay
    from: active
    to: idle
    for:
      seconds: "{{ range(45, 76) | random }}"

actions:
  - alias: Resolve decision inputs once
    variables:
      manual_override_global: "{{ is_state('input_boolean.manual_override', 'on') }}"

      override_helper: input_text.example_area_light_override
      override_val: "{{ states(override_helper) }}"
      override_active: "{{ override_val not in ['unknown','unavailable','none',''] and (override_val | trim) != '' }}"

      presence_on_now: "{{ is_state('binary_sensor.example_area_presence', 'on') }}"

      targets_state: "{{ states('sensor.example_area_lighting_targets') }}"
      raw_items: "{{ state_attr('sensor.example_area_lighting_targets', 'items_json') | default('[]', true) }}"
      decoded_items: "{{ raw_items | from_json(default=[]) }}"
      targets_items: "{{ decoded_items if (decoded_items is sequence and decoded_items is not string) else [] }}"

      desired_main_pct: >-
        {% set ns = namespace(v=none) %}
        {% for it in targets_items %}
          {% if it is mapping and it.light is defined and it.light == 'light.example_area_main_light' %}
            {% set ns.v = it.brightness_pct | int(0) %}
          {% endif %}
        {% endfor %}
        {{ ns.v if ns.v is not none else 0 }}

      desired_main_bri: "{{ ((desired_main_pct | int(0)) * 255 / 100) | round(0) | int(0) | min(255) }}"
      actual_main_bri: "{{ state_attr('light.example_area_main_light', 'brightness') | int(0) }}"
      actual_main_state: "{{ states('light.example_area_main_light') }}"

      bri_tol: 5
      brightness_mismatch: "{{ actual_main_state == 'on' and ((actual_main_bri - desired_main_bri) | abs > bri_tol) }}"

      last_apply_iso: "{{ states('input_datetime.example_area_last_auto_apply') }}"
      last_apply_dt: "{{ as_datetime(last_apply_iso, none) }}"
      last_apply_age_s: >-
        {% if last_apply_dt %}
          {{ (as_timestamp(now()) - as_timestamp(last_apply_dt)) | int(999999) }}
        {% else %}
          999999
        {% endif %}

  - alias: Global override gate (policy — evaluated before all routing)
    if:
      - alias: Global manual override is ON
        condition: template
        value_template: "{{ manual_override_global }}"
    then:
      - alias: Global manual override active – stop
        stop: "Global manual override"

    else:
      - alias: Route by trigger ID
        choose:
          - alias: Daily reset – clear per-area override
            conditions:
              - condition: trigger
                id: daily_reset
            sequence:
              - alias: Clear per-area override on daily reset
                action: input_text.set_value
                target:
                  entity_id: "{{ override_helper }}"
                data:
                  value: ""

          - alias: Light changed – detect manual override
            conditions:
              - condition: trigger
                id: light_changed
            sequence:
              - alias: Set per-area override if brightness mismatch detected
                if:
                  - alias: Conditions for manual override detection met
                    condition: template
                    value_template: >
                      {{ presence_on_now
                         and targets_state == 'on'
                         and (targets_items | length) > 0
                         and not override_active
                         and brightness_mismatch
                         and last_apply_age_s > 15 }}
                then:
                  - alias: Set per-area override helper
                    action: input_text.set_value
                    target:
                      entity_id: "{{ override_helper }}"
                    data:
                      value: "user_adjusted"
                else:
                  - alias: No override condition – stop
                    stop: "Light changed but no override condition met"

          - alias: Presence ON – apply lighting
            conditions:
              - condition: trigger
                id: presence_on
            sequence:
              - alias: Apply lighting if targets available and not overridden
                if:
                  - alias: Targets available and not overridden
                    condition: template
                    value_template: >
                      {{ targets_state == 'on'
                         and (targets_items | length) > 0
                         and not override_active }}
                then:
                  - alias: Stamp last automation apply time
                    action: input_datetime.set_datetime
                    target:
                      entity_id: input_datetime.example_area_last_auto_apply
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                  - alias: Apply lighting via centralized script
                    action: script.turn_on
                    target:
                      entity_id: script.set_lights_brightness
                    data:
                      variables:
                        manual_override_helper: "{{ override_helper }}"
                        items: "{{ targets_items }}"
                        transition: 1.5
                else:
                  - alias: Targets unavailable or overridden – stop
                    stop: "No targets or override active"

          - alias: Targets changed – apply if occupied and not overridden
            conditions:
              - condition: trigger
                id: targets_changed
            sequence:
              - alias: Apply lighting if occupied and targets available
                if:
                  - alias: Occupied, targets available, not overridden
                    condition: template
                    value_template: >
                      {{ presence_on_now
                         and targets_state == 'on'
                         and (targets_items | length) > 0
                         and not override_active }}
                then:
                  - alias: Stamp last automation apply time
                    action: input_datetime.set_datetime
                    target:
                      entity_id: input_datetime.example_area_last_auto_apply
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                  - alias: Apply lighting via centralized script
                    action: script.turn_on
                    target:
                      entity_id: script.set_lights_brightness
                    data:
                      variables:
                        manual_override_helper: "{{ override_helper }}"
                        items: "{{ targets_items }}"
                        transition: 1.5
                else:
                  - alias: Not occupied or overridden – stop
                    stop: "Not occupied or override active"

          - alias: Startup reconcile – apply if occupied and not overridden
            conditions:
              - condition: trigger
                id: startup_noncritical
            sequence:
              - alias: Apply lighting if occupied and targets available
                if:
                  - alias: Occupied, targets available, not overridden
                    condition: template
                    value_template: >
                      {{ presence_on_now
                         and targets_state == 'on'
                         and (targets_items | length) > 0
                         and not override_active }}
                then:
                  - alias: Stamp last automation apply time
                    action: input_datetime.set_datetime
                    target:
                      entity_id: input_datetime.example_area_last_auto_apply
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                  - alias: Apply lighting via centralized script
                    action: script.turn_on
                    target:
                      entity_id: script.set_lights_brightness
                    data:
                      variables:
                        manual_override_helper: "{{ override_helper }}"
                        items: "{{ targets_items }}"
                        transition: 1.5
                else:
                  - alias: Not occupied or overridden – stop
                    stop: "Not occupied or override active"

          - alias: Presence OFF – clear override and turn off lights
            conditions:
              - condition: trigger
                id: presence_off
            sequence:
              - alias: Clear per-area override when area vacates
                action: input_text.set_value
                target:
                  entity_id: "{{ override_helper }}"
                data:
                  value: ""
              - alias: Turn off area lights
                action: script.turn_on
                target:
                  entity_id: script.utility_turn_off_if_on_and_not_manually_activated
                data:
                  variables:
                    manual_override_helper: "{{ override_helper }}"
                    items:
                      - entity: light.example_area_main_light
                      - entity: light.example_area_accent_light
                    transition: 2
