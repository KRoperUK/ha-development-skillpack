alias: Automation – Example Deterministic Pattern
description: >
  Deterministic automation with post-restart reconciliation gate.

  - Routes actions by trigger ID; no polling.

  - Demonstrates: trigger-based decision tree, post-restart gate with randomized delay, and brains-vs-muscles pattern (sensor directives, automation routes).

  - Non-action paths stop explicitly for trace visibility.


  **CHANGELOG:**

  - 20260607-1200: Replaced invalid elif chain with choose; three trigger-ID branches are provably mutually exclusive. Removed default stop branch; unmatched triggers are silent by design. Fixed description formatting.

  - 20260102-1200: Canonicalized.

mode: single

triggers:
  - alias: Post-restart reconciliation gate (45–75s random)
    id: ha_restart_noncritical
    trigger: state
    entity_id: timer.ha_startup_delay
    from: active
    to: idle
    for:
      seconds: "{{ range(45, 76) | random }}"

  - alias: Source sensor changed
    id: source_changed
    trigger: state
    entity_id: sensor.example_source

  - alias: Time-based trigger (06:00 daily)
    id: time_trigger
    trigger: time
    at: "06:00:00"

actions:
  - alias: Resolve inputs once
    variables:
      source_value: "{{ states('sensor.example_source') | float(0) }}"
      directive_state: "{{ states('sensor.example_directive') }}"

  - alias: Route by trigger ID
    choose:
      - alias: Post-restart reconcile
        conditions:
          - condition: trigger
            id: ha_restart_noncritical
            alias: Triggered by startup delay completion
            note: >-
              Startup reconciliation is delayed until the global startup timer
              is idle so restored entities and helpers have time to stabilize.
        sequence:
          - alias: Reconcile directive
            action: homeassistant.update_entity
            target:
              entity_id: sensor.example_directive

      - alias: Source sensor changed
        conditions:
          - condition: trigger
            id: source_changed
        sequence:
          - alias: Apply directive if active
            if:
              - alias: Directive is active
                condition: state
                entity_id: sensor.example_directive
                state: "on"
            then:
              - alias: Execute action
                action: homeassistant.update_entity
                target:
                  entity_id: sensor.example_target
            else:
              - alias: Directive not active – stop
                stop: "Directive not active"

      - alias: Time-based check
        conditions:
          - condition: trigger
            id: time_trigger
        sequence:
          - alias: Daily check – stop
            stop: "Daily check (no-op)"
